---
deployment:
  tasks:
    - export FRONTEND_PUBLIC_PATH="/home/cetmedcl/public_html"
    - export REPO_PATH="$PWD"
    - export FRONTEND_DIST="$REPO_PATH/frontend/dist"
    - /bin/test -f "$FRONTEND_DIST/index.html"
    - /bin/test -d "$FRONTEND_DIST/assets"
    - /bin/test -f "$FRONTEND_DIST/docs/brochure-cetmed.pdf"
    - /bin/mkdir -p "$FRONTEND_PUBLIC_PATH"
    - /bin/mkdir -p /home/cetmedcl/.cetmed-deploy-backup
    - /bin/cp -f "$FRONTEND_PUBLIC_PATH/config.js" /home/cetmedcl/.cetmed-deploy-backup/config.js 2>/dev/null || true
    - /bin/test -f /home/cetmedcl/.cetmed-deploy-backup/config.js || /bin/cp -f /home/cetmedcl/new.cetmed.cl/config.js /home/cetmedcl/.cetmed-deploy-backup/config.js 2>/dev/null || true
    - /bin/find "$FRONTEND_PUBLIC_PATH" -mindepth 1 ! -name config.js -exec /bin/rm -rf {} +
    - /bin/cp -a "$FRONTEND_DIST/." "$FRONTEND_PUBLIC_PATH/"
    - /bin/cp -f /home/cetmedcl/.cetmed-deploy-backup/config.js "$FRONTEND_PUBLIC_PATH/config.js" 2>/dev/null || true
    - /bin/test -f "$FRONTEND_PUBLIC_PATH/index.html"
    - /bin/test -d "$FRONTEND_PUBLIC_PATH/assets"
    - /bin/test -f "$FRONTEND_PUBLIC_PATH/docs/brochure-cetmed.pdf"
